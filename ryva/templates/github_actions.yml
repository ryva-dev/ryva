# .github/workflows/ryva-governance.yml
# Generated by Ryva. Customize as needed.
# Runs AI governance checks on every push that touches agent definitions,
# prompts, or policies.

name: Ryva AI Governance

on:
  push:
    paths:
      - 'agents/**'
      - 'prompts/**'
      - 'policies.yml'
      - 'project.yml'
      - 'model_cards/**'
  pull_request:
    paths:
      - 'agents/**'
      - 'prompts/**'
      - 'policies.yml'
      - 'project.yml'

jobs:
  governance:
    name: AI Governance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ryva
        run: pip install ryva

      - name: Compile project
        run: ryva compile --strict

      - name: Run adversarial tests
        run: ryva test --adversarial
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Run fuzz tests
        run: ryva test --fuzz
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Check policy alignment
        run: ryva align
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate governance report
        run: ryva governance report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Verify lineage integrity
        run: ryva lineage verify --all

      - name: Sync to Ryva Cloud
        if: github.ref == 'refs/heads/main'
        run: ryva cloud sync
        env:
          RYVA_API_KEY: ${{ secrets.RYVA_API_KEY }}
          RYVA_PROJECT_ID: ${{ secrets.RYVA_PROJECT_ID }}

      - name: Upload governance artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: governance-report
          path: target/governance_report.json
          retention-days: 90
