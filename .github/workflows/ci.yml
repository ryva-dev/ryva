name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check ryva/

      - name: Run unit tests
        run: uv run pytest tests/ --tb=short

      - name: Run Ryva compile
        run: |
          cd my-first-project
          uv run ryva compile