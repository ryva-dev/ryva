name: Ryva CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ryva:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Ryva
        run: pip install ryva

      - name: Compile
        run: ryva compile

      - name: Test
        run: ryva test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}