name: Ryva CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ryva:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Ryva from source
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check ryva/

      - name: Run unit tests
        run: uv run pytest tests/ --tb=short

      - name: Compile project
        run: |
          cd my-first-project
          uv run ryva compile

      - name: Run tests
        run: |
          cd my-first-project
          uv run ryva test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}