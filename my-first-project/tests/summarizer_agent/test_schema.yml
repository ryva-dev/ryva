agent: ref(agents/summarizer_agent)
type: schema
cases:
- name: basic summarization
  input:
    text: Ryva is a framework for building, testing, and deploying agentic AI 
      systems. It brings the same engineering discipline to AI that dbt brought 
      to data transformation.
    max_sentences: 2
  expect:
    output.summary:
      type: str
      min_length: 10
    output.word_count:
      type: int
      range:
      - 1
      - 500
