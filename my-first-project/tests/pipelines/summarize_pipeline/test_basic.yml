pipeline: ref(pipelines/summarize_pipeline)
type: pipeline

cases:
  - name: "basic summarization pipeline"
    input:
      text: "Ryva is a framework for building, testing, and deploying agentic AI systems. It brings the same engineering discipline to AI that dbt brought to data transformation."
    expect:
      output.summary:
        type: str
        min_length: 10
      elapsed_ms:
        max: 15000

  - name: "pipeline latency check"
    input:
      text: "The quick brown fox jumps over the lazy dog."
    expect:
      output.summary:
        type: str
      elapsed_ms:
        max: 10000